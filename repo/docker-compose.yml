services:
  mysql:
    image: mysql:8.0
    container_name: senior_venue_mysql
    environment:
      MYSQL_DATABASE: senior_venue_platform
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-password123}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-password123}
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-uroot",
          "-p${MYSQL_ROOT_PASSWORD:-password123}",
        ]
      interval: 5s
      timeout: 5s
      retries: 30

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: senior_venue_app
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:mysql://senior_venue_mysql:3306/senior_venue_platform?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-root}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-password123}
      APP_SECURITY_AES_KEY: ${APP_SECURITY_AES_KEY:-0123456789ABCDEF0123456789ABCDEF}
    restart: on-failure
    ports:
      - "8080:8080"

volumes:
  mysql_data:
